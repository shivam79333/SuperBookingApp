name: CI/CD - Test & Deploy

# Trigger on push to main/develop and all PRs
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "18"

jobs:
  # ============================================================================
  # Backend Tests
  # ============================================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: superbooking_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env.test file
        working-directory: backend
        run: |
          cat > .env.test << EOF
          ENVIRONMENT=testing
          DJANGO_SETTINGS_MODULE=backend.settings.dev
          DEBUG=False
          SECRET_KEY=test-secret-key-12345
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/superbooking_test
          RAZORPAY_KEY_ID=rzp_test_SaqA5ki8ESwOpk
          RAZORPAY_KEY_SECRET=jYR1w5QLPbGVdbyId6bzY7QE
          RAZORPAY_WEBHOOK_SECRET=test-webhook-secret
          FIREBASE_CREDENTIALS_PATH=./firebase-service-account.json
          EOF

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/superbooking_test
        run: |
          python manage.py migrate --settings=backend.settings.dev

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/superbooking_test
        run: |
          python manage.py test --settings=backend.settings.dev --parallel

      - name: Check migrations
        working-directory: backend
        run: |
          python manage.py makemigrations --check --settings=backend.settings.dev

  # ============================================================================
  # Frontend Tests & Lint
  # ============================================================================
  frontend-tests:
    name: Frontend Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linting
        working-directory: frontend
        continue-on-error: true
        run: npm run lint

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
          VITE_MODE: production
          VITE_FIREBASE_API_KEY: test
          VITE_FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: test-project
          VITE_FIREBASE_STORAGE_BUCKET: test.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: 123456789
          VITE_FIREBASE_APP_ID: 1:123456789:web:test
        run: npm run build

  # ============================================================================
  # Code Quality Checks
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check code formatting (Black)
        working-directory: backend
        continue-on-error: true
        run: |
          pip install black
          black --check .

      - name: Lint with Flake8
        working-directory: backend
        continue-on-error: true
        run: |
          pip install flake8
          flake8 . --count --max-line-length=100 --extend-ignore=E501,W503

  # ============================================================================
  # Security Checks
  # ============================================================================
  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run safety check for dependencies
        working-directory: backend
        continue-on-error: true
        run: |
          pip install safety
          safety check

      - name: Run Django security check
        working-directory: backend
        run: |
          python manage.py check --deploy --settings=backend.settings.prod || true

  # ============================================================================
  # Build & Push Notifications
  # ============================================================================
  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.backend-tests.result }}" == "failure" ] || [ "${{ needs.frontend-tests.result }}" == "failure" ]; then
            echo "❌ Build failed - please check logs above"
            exit 1
          else
            echo "✅ Build passed - ready for deployment"
          fi

  # ============================================================================
  # Deployment to Render (Automatic on push to main/develop)
  # ============================================================================
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deployment (main → production)
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Render auto-deploys on push to main branch');
            console.log('Check Render dashboard for deployment status');

      - name: Trigger Render deployment (develop → staging)
        if: github.ref == 'refs/heads/develop'
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Render auto-deploys on push to develop branch');
            console.log('Check Render dashboard for deployment status');

      - name: Notify deployment
        run: |
          echo "✅ Deployment triggered"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"

  # ============================================================================
  # Summary
  # ============================================================================
  workflow-summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, build-status]
    if: always()

    steps:
      - name: Print workflow summary
        run: |
          echo "=== Workflow Summary ==="
          echo "Backend Tests: ${{ needs.backend-tests.result }}"
          echo "Frontend Tests: ${{ needs.frontend-tests.result }}"
          echo "Build Status: ${{ needs.build-status.result }}"
          echo "========================"

          if [ "${{ needs.build-status.result }}" == "success" ]; then
            echo "✅ All checks passed!"
          else
            echo "❌ Some checks failed - see logs above"
          fi
